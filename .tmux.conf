unbind r 
bind r source-file  ~/.tmux.conf

set -g mouse on

# set the leader key -to Ctrl+s
# s  did not work for me seems to be mapped to search or something. 
# set -g prefix s

# LDUR
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Open new windows in current directory
bind c new-window -c "#{pane_current_path}"

# This might need to go:
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:Tc"
# set-option -g escape-time 0


# bind j split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
# bind k split-window -v "tmux list-window -F '#W' | fzf --reverse | xargs tmux select-window -t"

# bind d confirm-before -p "Kill session #S? (y/n)" "kill-session"

# Bind Ctrl-b t to run the script in the background
bind t display-popup -E -w 90% -h 90% "bash ~/.config/open_todays_markdown.sh"



# Quick SSH to lgh.devpod
# bind-key C new-window -n "lgh.devpod" "ssh lgh.devpod"
bind-key C new-window -n "lgh.devpod" \; send-keys "ssh lgh.devpod" Enter \; send-keys "zsh" Enter

# Set mode-keys to vi for Vim-like navigation
setw -g mode-keys vi
# Unbind default rectangle-toggle action for v
unbind-key -T copy-mode-vi v
# Bind v to begin selection (as in Vim)
bind-key -T copy-mode-vi 'v' send -X begin-selection
# Bind C-v to toggle rectangle selection (for visual block mode)
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
# Bind y to copy selection (yank)
bind-key -T copy-mode-vi 'y' send -X copy-selection

set-option -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'chrvuistoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'santoshxshrestha/tmux-session-manager'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @session_manager_key 's'

# Custom session manager with Catppuccin theme
bind s display-popup -E -w 80% -h 60% -T ' tmux-session-manager ' -S 'fg=#cdd6f4,bg=#1e1e2e' -s 'fg=#89b4fa' -b rounded '
  tmux list-sessions -F "#{session_name}|#{session_windows}|#{?session_attached,attached,detached}" | 
  grep -v "^$(tmux display-message -p "#S")|" | 
  awk -F"|" "{
    status = (\$3 == \"attached\") ? \"\" : \"\"
    printf \"%-20s %s %2s windows %s\\n\", \$1, status, \$2, \"\"
  }" |
  fzf --reverse \
      --prompt="-> " \
      --header="═══ Session Switcher ═══ | Ctrl-R: refresh | Ctrl-D: delete | Ctrl-N: new-session" \
      --header-first \
      --border=rounded \
      --color="bg:#1e1e2e,bg+:#313244,fg:#cdd6f4,fg+:#f5e0dc,hl:#89b4fa,hl+:#89dceb,info:#f9e2af,prompt:#89b4fa,pointer:#f5c2e7,marker:#a6e3a1,spinner:#f5c2e7,header:#f38ba8" \
      --preview="tmux list-windows -t {1} -F \"  #{window_index}: #{window_name} #{?window_active,(active),}\"" \
      --preview-window="right:40%:wrap" \
      --bind="ctrl-r:reload(tmux list-sessions -F \"#{session_name}|#{session_windows}|#{?session_attached,attached,detached}\" | grep -v \"^\$(tmux display-message -p \"#S\")|\" | awk -F\"|\" \"{status = (\\\$3 == \\\"attached\\\") ? \\\"\\\" : \\\"\\\"; printf \\\"%-20s %s %2s windows %s\\\\n\\\", \\\$1, status, \\\$2, \\\"\\\"}\")" \
      --bind="ctrl-d:execute(tmux kill-session -t {1})+reload(tmux list-sessions -F \"#{session_name}|#{session_windows}|#{?session_attached,attached,detached}\" | grep -v \"^\$(tmux display-message -p \"#S\")|\" | awk -F\"|\" \"{status = (\\\$3 == \\\"attached\\\") ? \\\"\\\" : \\\"\\\"; printf \\\"%-20s %s %2s windows %s\\\\n\\\", \\\$1, status, \\\$2, \\\"\\\"}\")" \
      --bind="ctrl-n:execute(bash -c '\''echo -n -e \"== New tmux Session === \n Session Name ->  \" && read name && [ -n \"\$name\" ] && tmux new-session -d -s \"\$name\" 2>/dev/null && tmux switch-client -t \"\$name\"'\'')+abort" \
      --info=inline \
      --layout=reverse |
  awk "{print \$1}" | 
  xargs -r tmux switch-client -t
'

set -g @catppuccin_window_left_separator " "
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"


set -g set-clipboard on  
set -g renumber-windows on


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# This will step into and out of a nested session by hitting f10
set -g pane-active-border-style 'fg=#000000,bg=#ffff00'
bind -T root C-M-M-b  \
  set prefix None \;\
  set key-table off \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  set -g pane-active-border-style 'fg=#000000,bg=#00ff00'
  display-message "Nested mode activated 🕳️🐇"
  refresh-client -S \;\

bind -T off C-M-M-b \
  set -u prefix \;\
  set -u key-table \;\
  set -g pane-active-border-style 'fg=#000000,bg=#ffff00'
  display-message "Nested mode exited 🕳️🐇"
  refresh-client -S


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
