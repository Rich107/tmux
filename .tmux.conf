
bind r source-file  ~/.tmux.conf

set -g mouse on

# Window naming - show only the current running program
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'
set -g allow-rename off
set -g set-titles off

# set the leader key -to Ctrl+s
# s  did not work for me seems to be mapped to search or something. 
# set -g prefix s

# LDUR
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Switch to last session (like cd - or git checkout -)
bind - switch-client -l

# Open new windows in current directory
bind c new-window -c "#{pane_current_path}"

# Open new panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# This might need to go:
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:Tc"
# set-option -g escape-time 0


# Custom session manager with Catppuccin theme
bind s display-popup -E -w 80% -h 60% -T ' tmux-session-manager ' -S 'fg=#cdd6f4,bg=#1e1e2e' -s 'fg=#89b4fa' -b rounded '
  tmux list-sessions -F "#{session_name}|#{session_windows}|#{?session_attached,attached,detached}" | 
  grep -v "^$(tmux display-message -p "#S")|" | 
  awk -F"|" "{
    status = (\$3 == \"attached\") ? \"\" : \"\"
    printf \"%-20s %s %2s windows %s\\n\", \$1, status, \$2, \"\"
  }" |
  fzf --reverse \
      --prompt="-> " \
      --header="═══ Session Switcher ═══ | Ctrl-R: refresh | Ctrl-D: delete | Ctrl-N: new-session" \
      --header-first \
      --border=rounded \
      --color="bg:#1e1e2e,bg+:#313244,fg:#cdd6f4,fg+:#f5e0dc,hl:#89b4fa,hl+:#89dceb,info:#f9e2af,prompt:#89b4fa,pointer:#f5c2e7,marker:#a6e3a1,spinner:#f5c2e7,header:#f38ba8" \
      --preview="tmux list-windows -t {1} -F \"  #{window_index}: #{window_name} #{?window_active,(active),}\"" \
      --preview-window="right:40%:wrap" \
      --bind="ctrl-r:reload(tmux list-sessions -F \"#{session_name}|#{session_windows}|#{?session_attached,attached,detached}\" | grep -v \"^\$(tmux display-message -p \"#S\")|\" | awk -F\"|\" \"{status = (\\\$3 == \\\"attached\\\") ? \\\"\\\" : \\\"\\\"; printf \\\"%-20s %s %2s windows %s\\\\n\\\", \\\$1, status, \\\$2, \\\"\\\"}\")" \
      --bind="ctrl-d:execute(tmux kill-session -t {1})+reload(tmux list-sessions -F \"#{session_name}|#{session_windows}|#{?session_attached,attached,detached}\" | grep -v \"^\$(tmux display-message -p \"#S\")|\" | awk -F\"|\" \"{status = (\\\$3 == \\\"attached\\\") ? \\\"\\\" : \\\"\\\"; printf \\\"%-20s %s %2s windows %s\\\\n\\\", \\\$1, status, \\\$2, \\\"\\\"}\")" \
      --bind="ctrl-n:execute(bash -c '\''echo -n -e \"== New tmux Session === \n Session Name ->  \" && read name && [ -n \"\$name\" ] && tmux new-session -d -s \"\$name\" 2>/dev/null && tmux switch-client -t \"\$name\"'\'')+abort" \
      --info=inline \
      --layout=reverse |
  awk "{print \$1}" | 
  xargs -r tmux switch-client -t'


# Open today's daily note in a popup
bind t display-popup -E -w 90% -h 90% "bash ~/.config/open_todays_markdown.sh"

# Just command picker - fzf popup, prepopulates `just <recipe>` into a window
bind J display-popup -E -w 90% -h 90% -T ' just-picker ' -S 'fg=#cdd6f4,bg=#1e1e2e' -s 'fg=#89b4fa' -b rounded "bash ~/.tmux/scripts/tmux-just-picker.sh"

# Quick SSH to lgh.devpod
bind-key C new-window -n "claude" \; send-keys "claude" Enter \;

# Set mode-keys to vi for Vim-like navigation
setw -g mode-keys vi
# Unbind default rectangle-toggle action for v
unbind-key -T copy-mode-vi v
# Bind v to begin selection (as in Vim)
bind-key -T copy-mode-vi 'v' send -X begin-selection
# Bind C-v to toggle rectangle selection (for visual block mode)
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
# Bind y to copy selection (yank)
bind-key -T copy-mode-vi 'y' send -X copy-selection

set-option -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Catppuccin configuration
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#{b:pane_current_command}"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#{b:pane_current_command}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g set-clipboard on
set -g renumber-windows on

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Configuration AFTER TPM loads catppuccin (overrides plugin defaults)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""

# Custom git branch module (catppuccin style)
set -g @catppuccin_git_branch_icon "󰘬 "
set -gF @catppuccin_git_branch_color "#{E:@thm_mauve}"
set -g @catppuccin_git_branch_text " #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-')"

set -gF @catppuccin_status_git_branch_icon_fg "#{E:@thm_crust}"
set -gF @catppuccin_status_git_branch_text_fg "#{E:@thm_fg}"
set -gF @catppuccin_status_git_branch_icon_bg "#{@catppuccin_git_branch_color}"

set -gF @catppuccin_status_git_branch \
  "#[fg=#{@catppuccin_status_git_branch_icon_bg}]#{@catppuccin_status_left_separator}"
set -agF @catppuccin_status_git_branch \
  "#[fg=#{@catppuccin_status_git_branch_icon_fg},bg=#{@catppuccin_status_git_branch_icon_bg}]#{@catppuccin_git_branch_icon}"
set -agF @catppuccin_status_git_branch \
  "#{@catppuccin_status_middle_separator}"
set -agF @catppuccin_status_git_branch \
  "#[fg=#{@catppuccin_status_git_branch_text_fg},bg=#{E:@catppuccin_status_module_text_bg}]"
set -ag @catppuccin_status_git_branch "#{E:@catppuccin_git_branch_text}"
set -agF @catppuccin_status_git_branch "#[fg=#{E:@catppuccin_status_module_text_bg}]#{@catppuccin_status_right_separator}"

set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_git_branch}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Override window formats to show command name (catppuccin options don't work after TPM)
# Inactive: number has overlay_0 bg, text has surface_0 bg
set -gw window-status-format "#[fg=#{@thm_surface_1},bg=default]#[fg=#{@thm_subtext_0},bg=#{@thm_surface_1}] #I #[fg=#{@thm_surface_1},bg=#{@thm_surface_0}]#[fg=#{@thm_subtext_0},bg=#{@thm_surface_0}] #W #[fg=#{@thm_surface_0},bg=default]"
# Active: number has mauve bg, text has same bg as inactive
set -gw window-status-current-format "#[fg=#{@thm_mauve},bg=default]#[fg=#{@thm_crust},bg=#{@thm_mauve}] #I #[fg=#{@thm_mauve},bg=#{@thm_surface_0}]#[fg=#{@thm_subtext_0},bg=#{@thm_surface_0}] #W #[fg=#{@thm_surface_0},bg=default]"

# Disable tmux-resurrect's accidental save hotkey (default: prefix + Ctrl-s).
# Must come after TPM's run line so it unbinds the key resurrect set.
# Restore (prefix + Ctrl-r) is left intact.
unbind C-s

# Rename current window via an nvim popup (replaces the default prompt).
#   :wq renames, :q cancels, Esc stays in the popup for normal nvim editing.
bind , display-popup -w 60% -h 30% -b rounded -T " rename window " -E "~/.tmux/scripts/rename-window.sh"

