
bind r source-file  ~/.tmux.conf

set -g mouse on

# Window naming - show only the current running program
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'
set -g allow-rename off
set -g set-titles off

# set the leader key -to Ctrl+s
# s  did not work for me seems to be mapped to search or something. 
# set -g prefix s

# LDUR
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Open new windows in current directory
bind c new-window -c "#{pane_current_path}"

# Open new panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# This might need to go:
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:Tc"
# set-option -g escape-time 0


# bind j split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
# bind k split-window -v "tmux list-window -F '#W' | fzf --reverse | xargs tmux select-window -t"

# bind d confirm-before -p "Kill session #S? (y/n)" "kill-session"

# Bind Ctrl-b t to run the script in the background
bind t display-popup -E -w 90% -h 90% "bash ~/.config/open_todays_markdown.sh"



# Quick SSH to lgh.devpod
# bind-key C new-window -n "lgh.devpod" "ssh lgh.devpod"
bind-key C new-window -n "lgh.devpod" \; send-keys "ssh lgh.devpod" Enter \; send-keys "zsh" Enter

# Set mode-keys to vi for Vim-like navigation
setw -g mode-keys vi
# Unbind default rectangle-toggle action for v
unbind-key -T copy-mode-vi v
# Bind v to begin selection (as in Vim)
bind-key -T copy-mode-vi 'v' send -X begin-selection
# Bind C-v to toggle rectangle selection (for visual block mode)
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
# Bind y to copy selection (yank)
bind-key -T copy-mode-vi 'y' send -X copy-selection

set-option -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Catppuccin configuration
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#{b:pane_current_command}"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#{b:pane_current_command}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g set-clipboard on
set -g renumber-windows on

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# This will step into and out of a nested session by hitting f10
set -g pane-active-border-style 'fg=#000000,bg=#ffff00'
bind -T root C-M-M-b  \
  set prefix None \;\
  set key-table off \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  set -g pane-active-border-style 'fg=#000000,bg=#00ff00'
  display-message "Nested mode activated 🕳️🐇"
  refresh-client -S \;\

bind -T off C-M-M-b \
  set -u prefix \;\
  set -u key-table \;\
  set -g pane-active-border-style 'fg=#000000,bg=#ffff00'
  display-message "Nested mode exited 🕳️🐇"
  refresh-client -S


# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Configuration AFTER TPM loads catppuccin (overrides plugin defaults)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Override window-status-format to match current-format style but with different colors
# Using @thm_surface_0 (darker) for non-current, @thm_overlay_2 for the number badge
set -gw window-status-format "#[fg=#cdd6f4,bg=#{@thm_surface_0}] #[fg=#cdd6f4,bg=#{@thm_surface_0}]#{b:pane_current_command} #[fg=#11111b,bg=#{@thm_overlay_2}] #I "
